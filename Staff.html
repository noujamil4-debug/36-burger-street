<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Saladbox Staff | المطبخ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #000; color: white; }
        .order-card { background: #0a0a0a; border-right: 8px solid #10b981; border-radius: 25px; animation: slideIn 0.5s ease; }
        @keyframes slideIn { from { transform: translateX(50px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body class="p-8">
    <div class="flex justify-between items-center mb-12 bg-zinc-900/50 p-6 rounded-[30px] border border-zinc-800">
        <div>
            <h1 class="text-3xl font-black text-green-500 italic uppercase tracking-tighter">SALADBOX STAFF</h1>
            <p class="text-zinc-500 text-xs font-bold italic">نظام استقبال الطلبات المباشر</p>
        </div>
        <div class="text-green-500 font-black animate-pulse">متصل بالمطبخ 🟢</div>
    </div>
    <div id="list" class="grid gap-6">
        <p id="empty" class="text-center text-zinc-800 py-40 italic text-2xl font-black uppercase">Waiting for orders...</p>
    </div>
    <audio id="bell" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>
    <script>
        const firebaseConfig = { databaseURL: "https://saladbox-f541b-default-rtdb.europe-west1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        db.ref('orders').on('value', (snap) => {
            const list = document.getElementById('list');
            const empty = document.getElementById('empty');
            list.innerHTML = "";
            if(snap.exists()) {
                empty.style.display = 'none';
                snap.forEach((child) => {
                    const o = child.val();
                    const id = child.key;
                    list.insertAdjacentHTML('afterbegin', `
                        <div class="order-card p-8 flex justify-between items-center border border-zinc-900 shadow-2xl">
                            <div>
                                <div class="flex items-center gap-3 mb-3">
                                    <span class="bg-green-500 text-black px-4 py-1 rounded-full text-[10px] font-black uppercase italic">New Order</span>
                                    <span class="text-zinc-500 font-bold text-sm italic">${o.time}</span>
                                </div>
                                <h2 class="text-4xl font-black text-white italic uppercase tracking-tighter">${o.item}</h2>
                                <p class="text-green-500 font-black text-2xl mt-2 italic">${o.customer} • ${o.phone}</p>
                                <p class="text-zinc-500 font-bold mt-2 text-lg italic">📍 ${o.address}</p>
                            </div>
                            <div class="text-center">
                                <div class="text-3xl font-black mb-6 uppercase tracking-tighter">${o.price} DA</div>
                                <button onclick="done('${id}')" class="bg-white text-black px-10 py-4 rounded-2xl font-black text-lg hover:bg-green-400 transition shadow-xl">تحضير ✅</button>
                            </div>
                        </div>
                    `);
                });
                document.getElementById('bell').play().catch(e => {});
            } else { empty.style.display = 'block'; }
        });
        function done(id) { if(confirm("تم تحضير الطلب؟")) db.ref('orders/' + id).remove(); }
    </script>
</body>
</html>
