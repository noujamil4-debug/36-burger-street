<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة الطلبات | 36 Burger Street</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo'; background: #0a0a0a; color: white; padding: 20px; }
        .order-card { background: #1a1a1a; padding: 15px; margin-bottom: 10px; border-radius: 10px; border-right: 5px solid #ff9f1c; display: flex; justify-content: space-between; }
        .badge { background: #ff9f1c; color: black; padding: 5px 10px; border-radius: 5px; font-weight: bold; }
        h1 { color: #ff9f1c; text-align: center; }
    </style>
</head>
<body>

    <h1>🍔 لوحة تحكم الموظفين (الطلبات الحية)</h1>
    <div id="liveOrders">جاري جلب الطلبات...</div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD5h3Luj1fmPBkZHJ9VukwA",
            projectId: "saladbox-f541b",
            appId: "1:326812021021:web:2253e938ca1794776106e2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // جلب الطلبات فور حدوثها
        db.collection("orders").orderBy("timestamp", "desc").onSnapshot(snapshot => {
            const container = document.getElementById('liveOrders');
            container.innerHTML = "";
            snapshot.forEach(doc => {
                const data = doc.data();
                container.innerHTML += `
                    <div class="order-card">
                        <div>
                            <strong>الزبون:</strong> ${data.customer} <br>
                            <strong>الهاتف:</strong> ${data.phone} <br>
                            <strong>البلدية:</strong> ${data.commune} <br>
                            <strong>الطلب:</strong> <span style="color:#ff9f1c">${data.item}</span>
                        </div>
                        <div>
                            <span class="badge">${data.status}</span>
                        </div>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
