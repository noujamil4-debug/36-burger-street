<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة إدارة الطلبات | 36 Burger Street</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #ff9f1c; --success: #2ecc71; --danger: #e63946; --dark: #0a0a0a; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: var(--dark); color: white; padding-bottom: 50px; }

        .admin-top-bar {
            background: #111; color: var(--primary); padding: 20px;
            text-align: center; font-size: 1.8rem; font-weight: 900;
            border-bottom: 4px solid var(--primary); margin-bottom: 20px;
        }

        .admin-tools { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; }
        .btn-delete-all { background: var(--danger); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        .orders-list { padding: 0 15px; max-width: 800px; margin: 0 auto; }
        
        /* كارت الطلب */
        .order-card { 
            background: #1a1a1a; padding: 20px; margin-bottom: 20px; border-radius: 20px; 
            border-right: 10px solid var(--primary); transition: 0.3s;
        }

        /* ستايل الطلب المكتمل */
        .order-card.completed { border-right-color: var(--success); opacity: 0.8; }

        .order-info p { font-size: 1.3rem; margin-bottom: 8px; }
        .order-info b { color: var(--primary); }
        .item-name { background: #000; padding: 8px; border-radius: 10px; color: #fff; font-weight: 900; font-size: 1.5rem; display: block; text-align: center; border: 1px solid var(--primary); margin: 10px 0; }

        /* أزرار الحالة */
        .actions { display: flex; gap: 10px; margin-top: 15px; }
        .btn-status { 
            flex: 1; padding: 12px; border: none; border-radius: 10px; 
            font-weight: bold; cursor: pointer; font-size: 1.1rem; transition: 0.3s;
        }
        .btn-ready { background: var(--success); color: white; }
        .btn-ready:hover { background: #27ae60; }
        
        .status-text { font-weight: 900; color: var(--success); display: none; text-align: center; font-size: 1.2rem; }
        .completed .status-text { display: block; }
        .completed .btn-ready { display: none; }

        .no-orders { text-align: center; color: #666; font-size: 1.5rem; margin-top: 50px; }
    </style>
</head>
<body>

    <div class="admin-top-bar">36-burger-street - لوحة التحكم</div>

    <div class="admin-tools">
        <button class="btn-delete-all" onclick="deleteAllOrders()"><i class="fas fa-trash"></i> مسح الكل</button>
    </div>

    <div id="liveOrders" class="orders-list">
        <p class="no-orders">جاري تحميل الطلبات...</p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD5h3Luj1fmPBkZHJ9VukwA",
            authDomain: "saladbox-f541b.firebaseapp.com",
            projectId: "saladbox-f541b",
            appId: "1:326812021021:web:2253e938ca1794776106e2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // جلب وعرض الطلبات
        db.collection("orders").orderBy("timestamp", "desc").onSnapshot(snapshot => {
            const container = document.getElementById('liveOrders');
            if (snapshot.empty) {
                container.innerHTML = '<p class="no-orders">لا توجد طلبات</p>';
                return;
            }
            container.innerHTML = "";
            snapshot.forEach(doc => {
                const data = doc.data();
                const isCompleted = data.status === "تم التجهيز";
                
                container.innerHTML += `
                    <div class="order-card ${isCompleted ? 'completed' : ''}">
                        <div class="order-info">
                            <p><b>👤 الزبون:</b> ${data.customer}</p>
                            <p><b>📞 الهاتف:</b> ${data.phone}</p>
                            <p><b>📍 البلدية:</b> ${data.commune}</p>
                            <span class="item-name">${data.item}</span>
                        </div>
                        <div class="actions">
                            <button class="btn-status btn-ready" onclick="markAsReady('${doc.id}')">
                                <i class="fas fa-check"></i> تم التجهيز
                            </button>
                            <p class="status-text"><i class="fas fa-check-circle"></i> الطلبية جاهزة</p>
                        </div>
                    </div>
                `;
            });
        });

        // وظيفة تغيير حالة الطلب
        function markAsReady(orderId) {
            db.collection("orders").doc(orderId).update({
                status: "تم التجهيز"
            }).then(() => {
                console.log("Order updated!");
            }).catch(error => {
                alert("خطأ في التحديث: " + error.message);
            });
        }

        async function deleteAllOrders() {
            if(confirm("هل تريد مسح جميع الطلبات؟")) {
                const snapshot = await db.collection("orders").get();
                const batch = db.batch();
                snapshot.docs.forEach(doc => batch.delete(doc.ref));
                await batch.commit();
            }
        }
    </script>
</body>
</html>
