<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saladbox Staff</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body class="bg-black text-white p-4">
    <h1 class="text-[#10b981] text-2xl font-black mb-6">خزانة الطلبات 📥</h1>
    
    <div class="grid grid-cols-2 gap-4 mb-8">
        <div class="bg-[#161616] p-4 rounded-2xl border-b-4 border-white text-center">
            <p class="text-[10px] text-gray-500 font-bold uppercase">الطلبات</p>
            <h2 id="totalOrders" class="text-3xl font-black">0</h2>
        </div>
        <div class="bg-[#161616] p-4 rounded-2xl border-b-4 border-[#10b981] text-center">
            <p class="text-[10px] text-gray-400 font-bold uppercase">الربح</p>
            <h2 id="totalProfit" class="text-xl font-black text-[#10b981]">0</h2>
        </div>
    </div>

    <div id="list" class="space-y-4"></div>

    <audio id="bell" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3"></audio>

    <script>
        const config = {
            apiKey: "AIzaSyDfVfaCVOoP_N_J1B6iSmDX4Vf7c3A", 
            databaseURL: "https://legibier-fa574-default-rtdb.firebaseio.com/",
            projectId: "legibier-fa574"
        };
        firebase.initializeApp(config);
        const db = firebase.database();

        db.ref('orders').on('value', (snapshot) => {
            const list = document.getElementById('list');
            list.innerHTML = "";
            let count = 0; let profit = 0;

            snapshot.forEach((child) => {
                const o = child.val(); const id = child.key;
                count++; profit += parseInt(o.price);

                const html = `
                    <div class="bg-[#161616] p-5 rounded-3xl border border-gray-800">
                        <div class="flex justify-between items-start mb-4">
                            <h3 class="text-lg font-black italic underline decoration-green-500">${o.item}</h3>
                            <span class="text-[10px] bg-white text-black px-2 py-0.5 rounded font-black">${o.status}</span>
                        </div>
                        <p class="text-gray-400 text-xs mb-4">الزبون: ${o.customer} | 📍 ${o.location}</p>
                        <div class="grid grid-cols-3 gap-2">
                            <button onclick="wa('${o.phone}', 'prep', '${o.customer}')" class="bg-blue-600 text-white py-3 rounded-xl font-bold text-[10px]">تحضير</button>
                            <button onclick="wa('${o.phone}', 'done', '${o.customer}')" class="bg-[#10b981] text-black py-3 rounded-xl font-bold text-[10px]">جاهز</button>
                            <button onclick="del('${id}')" class="bg-red-600 text-white py-3 rounded-xl font-bold text-[10px]">حذف</button>
                        </div>
                    </div>`;
                list.insertAdjacentHTML('afterbegin', html);
            });
            document.getElementById('totalOrders').innerText = count;
            document.getElementById('totalProfit').innerText = profit.toLocaleString();
        });

        db.ref('orders').on('child_added', () => { document.getElementById('bell').play().catch(()=>{}); });
        function wa(p, t, n) {
            let m = t === 'prep' ? `مرحباً ${n}، طلبك من Saladbox بدأ التحضير الآن!` : `طلبك جاهز يا ${n}! سيصلك الآن.`;
            window.open(`https://wa.me/${p}?text=${encodeURIComponent(m)}`, '_blank');
        }
        function del(id) { if(confirm("حذف الطلب؟")) db.ref('orders/' + id).remove(); }
    </script>
</body>
</html>
