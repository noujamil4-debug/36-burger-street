<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saladbox | Algeria</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root { --green: #10b981; --black: #000000; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--black); color: white; margin: 0; overflow-x: hidden; }
        #splash { position: fixed; inset: 0; background: black; display: flex; align-items: center; justify-content: center; z-index: 5000; transition: 0.8s; }
        .splash-text { color: var(--green); font-size: clamp(3rem, 15vw, 6rem); font-weight: 900; font-style: italic; animation: pulse 1.5s infinite; text-transform: uppercase; letter-spacing: -3px; }
        #branch-view { display: none; height: 100vh; flex-direction: column; align-items: center; justify-content: center; }
        .card { background: #0a0a0a; border: 1px solid #222; padding: 50px 30px; border-radius: 45px; text-align: center; width: 90%; max-width: 400px; }
        #menu-view { display: none; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 6000; display: none; align-items: center; justify-content: center; padding: 20px; }
        input, select { background: #000 !important; border: 1px solid #222 !important; color: white !important; width: 100%; padding: 16px; border-radius: 20px; margin-bottom: 12px; text-align: center; outline: none; appearance: none; }
        
        /* رسالة النجاح المحدثة */
        #success-msg { 
            display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); 
            background: #10b981; color: black; padding: 15px 40px; border-radius: 50px; 
            font-weight: 900; z-index: 9999; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 2px solid white;
        }

        @keyframes pulse { 0%, 100% { opacity: 0.4; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <!-- تنبيه النجاح -->
    <div id="success-msg">✅ تم استلام طلبك في المطبخ!</div>

    <div id="splash"><h1 class="splash-text">Saladbox</h1></div>

    <div id="branch-view">
        <div class="card" onclick="startApp()">
            <h3 class="text-4xl font-black text-green-500 mb-2 italic uppercase">Sidi Yahia</h3>
            <button class="w-full bg-green-500 text-black py-5 rounded-[25px] font-black text-xl">دخول للمنيو</button>
        </div>
    </div>

    <div id="menu-view">
        <div class="p-10 text-center font-black italic text-green-500 text-5xl tracking-tighter uppercase">Saladbox</div>
        <main id="grid" class="p-6 grid gap-8 grid-cols-1 md:grid-cols-2 lg:grid-cols-3 max-w-7xl mx-auto pb-32"></main>
    </div>

    <div id="modal" class="modal">
        <div class="bg-[#0a0a0a] border-2 border-green-500 p-10 rounded-[50px] w-full max-w-md shadow-2xl">
            <h2 class="text-2xl font-black mb-8 text-center text-green-500 italic uppercase">بيانات الطلب</h2>
            <div id="orderInfo" class="mb-8 text-center bg-black/50 p-6 rounded-3xl border border-zinc-900 font-bold text-xl italic text-white"></div>
            <input id="uName" type="text" placeholder="الاسم الكامل">
            <input id="uPhone" type="tel" placeholder="رقم الهاتف">
            <select id="uCommune">
                <option value="" disabled selected>-- اختر البلدية --</option>
                <option value="Sidi Yahia">Sidi Yahia</option>
                <option value="Hydra">Hydra</option>
                <option value="Draria">Draria</option>
                <option value="El Biar">El Biar</option>
                <option value="Dely Ibrahim">Dely Ibrahim</option>
            </select>
            <button id="sendBtn" onclick="sendOrder()" class="w-full bg-green-500 text-black py-5 rounded-[22px] font-black text-xl mt-4 active:scale-95 transition">إرسال الطلب 📥</button>
            <button onclick="document.getElementById('modal').style.display='none'" class="w-full text-zinc-600 mt-6 font-bold text-sm uppercase text-center">إلغاء</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD5h3Luj1fmPBkZHJ9VukwAY98-K4B9_Y",
            authDomain: "saladbox-f541b.firebaseapp.com",
            databaseURL: "https://saladbox-f541b-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "saladbox-f541b"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        setTimeout(() => { 
            document.getElementById('splash').style.opacity = '0';
            setTimeout(() => { document.getElementById('splash').style.display = 'none'; document.getElementById('branch-view').style.display = 'flex'; }, 800);
        }, 2500);

        function startApp() { document.getElementById('branch-view').style.display = 'none'; document.getElementById('menu-view').style.display = 'block'; render(); }

        const menu = [
            { id: 1, name: 'Chicken Royal', price: 1250, img: 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=600' },
            { id: 2, name: 'Pesto Pasta', price: 1450, img: 'https://images.unsplash.com/photo-1473093226795-af9932fe5856?w=600' }
        ];

        function render() {
            const grid = document.getElementById('grid');
            grid.innerHTML = menu.map(i => `
                <div class="bg-[#0a0a0a] p-5 rounded-[40px] border border-zinc-900 shadow-xl">
                    <img src="${i.img}" class="w-full h-56 object-cover rounded-[30px] mb-6">
                    <div class="flex justify-between items-center mb-6 px-2">
                        <h3 class="text-xl font-black italic uppercase">${i.name}</h3>
                        <span class="bg-green-500 text-black px-4 py-1 rounded-xl font-black text-sm">${i.price} DA</span>
                    </div>
                    <button onclick="openModal(${i.id})" class="w-full bg-green-500 text-black py-4 rounded-2xl font-black text-lg">طلب الوجبة</button>
                </div>
            `).join('');
        }

        let selected = null;
        function openModal(id) {
            selected = menu.find(i => i.id === id);
            document.getElementById('orderInfo').innerHTML = `<p class="text-green-500">${selected.name}</p><p>${selected.price} DA</p>`;
            document.getElementById('modal').style.display = 'flex';
        }

        function sendOrder() {
            const name = document.getElementById('uName').value;
            const phone = document.getElementById('uPhone').value;
            const commune = document.getElementById('uCommune').value;
            if(!name || !phone || !commune) return alert("الرجاء إكمال البيانات!");

            const btn = document.getElementById('sendBtn');
            btn.innerText = "جاري الإرسال...";
            btn.disabled = true;

            const order = { item: selected.name, price: selected.price, customer: name, phone: phone, address: commune, time: new Date().toLocaleTimeString('ar-DZ'), status: 'new' };
            
            // تصحيح منطق الإرسال:
            db.ref('orders').push(order, function(error) {
                if (error) {
                    alert("عذراً، حدث خطأ: " + error.message);
                    btn.disabled = false;
                    btn.innerText = "تأكيد الطلب 📥";
                } else {
                    // نجاح!
                    document.getElementById('modal').style.display = 'none';
                    const success = document.getElementById('success-msg');
                    success.style.display = 'block';
                    
                    // تصفير الخانات
                    document.getElementById('uName').value = "";
                    document.getElementById('uPhone').value = "";
                    btn.disabled = false;
                    btn.innerText = "تأكيد الطلب 📥";

                    // إخفاء رسالة النجاح بعد 4 ثواني
                    setTimeout(() => { success.style.display = 'none'; }, 4000);
                }
            });
        }
    </script>
</body>
</html>
