<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>36 Burger Street | Official</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #1a1a1a; --gold: #D4AF37; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background-color: var(--bg); color: white; overflow-x: hidden; }
        #home-view { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: linear-gradient(rgba(26,26,26,0.9), rgba(26,26,26,0.9)), url('https://images.unsplash.com/photo-1571091718767-18b5b1457add?q=80&w=1920') center/cover; }
        .logo-box { width: 150px; height: 150px; border-radius: 50%; border: 3px solid var(--gold); background: url('https://i.postimg.cc/cLPjm2br/e62a4436040657-570d2baa45a2b.jpg') center/cover; box-shadow: 0 0 30px var(--gold); margin-bottom: 20px; }
        h1 { font-family: 'Playfair Display'; font-size: 2.5rem; color: var(--gold); margin-bottom: 30px; }
        .btn-main { background: var(--gold); color: #000; padding: 15px 40px; border-radius: 50px; font-weight: 900; cursor: pointer; border: 2px solid white; }
        #menu-view { display: none; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .card { background: #222; border-radius: 20px; overflow: hidden; border: 1px solid #333; text-align: center; padding-bottom: 15px; }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #111; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; border: 1px solid var(--gold); }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; background: #000; border: 1px solid #444; color: #fff; border-radius: 8px; }
    </style>
</head>
<body>

    <div id="home-view">
        <div class="logo-box"></div>
        <h1>36 BURGER STREET</h1>
        <div class="btn-main" onclick="showMenu()">فتح المنيو 🍔</div>
    </div>

    <div id="menu-view">
        <button onclick="hideMenu()" style="background:none; color:var(--gold); border:1px solid var(--gold); padding:5px 10px; border-radius:5px;">← رجوع</button>
        <div class="grid">
            <div class="card">
                <img src="https://i.postimg.cc/8zK2JwWL/Crispy-Strips-Western-San638669275205899268.jpg">
                <h3>SANDWICH POULET</h3><p style="color:var(--gold)">370 DA</p>
                <button class="btn-main" onclick="openModal('ساندوتش دجاج')">اطلب الآن</button>
            </div>
            <div class="card">
                <img src="https://i.postimg.cc/TwF2VfDq/plat-traditionnel-nouvelle-orleans-isole-fond-transparent-893571-44245.jpg">
                <h3>SANDWICH CRISPY</h3><p style="color:var(--gold)">490 DA</p>
                <button class="btn-main" onclick="openModal('ساندوتش كريسبي')">اطلب الآن</button>
            </div>
        </div>
    </div>

    <div class="modal" id="orderModal">
        <div class="modal-content">
            <h2 id="orderTitle" style="color:var(--gold); text-align:center;">تأكيد الطلب</h2>
            <input type="text" id="name" placeholder="الاسم الكامل">
            <input type="tel" id="phone" placeholder="رقم الهاتف">
            <select id="area">
                <option value="">منطقة التوصيل</option>
                <option value="Sidi Yahia">سيدي يحيا</option>
                <option value="Val d'Hydra">فال ديدرا</option>
                <option value="Dely Ibrahim">ديلي براهيم</option>
            </select>
            <button id="sendBtn" class="btn-main" style="width:100%" onclick="sendOrder()">إرسال الطلب 🍔</button>
            <button onclick="closeModal()" style="background:none; color:gray; border:none; margin-top:10px;">إلغاء</button>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD5h3Luj1fmPBkZHJ9VukwA",
            authDomain: "saladbox-f541b.firebaseapp.com",
            projectId: "saladbox-f541b",
            storageBucket: "saladbox-f541b.appspot.com",
            messagingSenderId: "326812021021",
            // الرقم المحدث من صورتك الأخيرة:
            appId: "1:326812021021:web:2253e938ca143537fcf1f4" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function showMenu() { document.getElementById('home-view').style.display='none'; document.getElementById('menu-view').style.display='block'; }
        function hideMenu() { document.getElementById('home-view').style.display='flex'; document.getElementById('menu-view').style.display='none'; }
        
        let selectedItem = "";
        function openModal(n) { selectedItem = n; document.getElementById('orderTitle').innerText = n; document.getElementById('orderModal').style.display='flex'; }
        function closeModal() { document.getElementById('orderModal').style.display='none'; }

        function sendOrder() {
            const n = document.getElementById('name').value;
            const p = document.getElementById('phone').value;
            const a = document.getElementById('area').value;
            const btn = document.getElementById('sendBtn');

            if(!n || !p || !a) return alert("أكمل البيانات");
            
            btn.innerText = "جاري الإرسال...";
            btn.disabled = true;

            db.collection("orders").add({
                customer: n, phone: p, commune: a, item: selectedItem,
                status: "جديد", timestamp: firebase.firestore.FieldValue.serverTimestamp()
            })
            .then(() => {
                alert("تم إرسال طلبك بنجاح! 🍔");
                closeModal();
                btn.innerText = "إرسال الطلب 🍔";
                btn.disabled = false;
            })
            .catch((error) => {
                alert("خطأ: لم يتم فتح القفل في Firebase (Rules). تأكد من تغييرها لـ true واضغط Publish.");
                console.error(error);
                btn.innerText = "إعادة المحاولة";
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
