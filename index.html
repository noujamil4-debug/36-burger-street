<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>36 Burger Street | طلبات أسطورية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #ff9f1c; --dark: #0a0a0a; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background-color: var(--dark); color: white; }
        
        /* تصميم الهيرو والمنيو (نفس الستايل الأسطوري السابق) */
        .hero { height: 60vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: radial-gradient(circle, #1a1a1a, #000); }
        .hero h1 { font-family: 'Bebas Neue'; font-size: 5rem; color: var(--primary); margin: 0; }
        
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; padding: 40px 8%; }
        .item-card { background: #1a1a1a; padding: 20px; border-radius: 20px; border: 1px solid #333; text-align: center; }
        .price { color: var(--primary); font-size: 1.5rem; font-weight: 900; margin: 10px 0; display: block; }
        .btn-order { background: var(--primary); color: black; border: none; padding: 10px 20px; border-radius: 50px; cursor: pointer; font-weight: bold; width: 100%; }

        /* نافذة الطلب */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #1a1a1a; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; border: 1px solid var(--primary); }
        input, select { width: 100%; padding: 12px; margin-bottom: 15px; background: #222; border: 1px solid #444; color: white; border-radius: 8px; }
    </style>
</head>
<body>

    <section class="hero">
        <h1>36 BURGER STREET</h1>
        <p>طعم الشارع الحقيقي</p>
    </section>

    <div class="menu-grid" id="menu">
        <div class="item-card">
            <h3>تاكوس دجاج</h3>
            <span class="price">350 DA</span>
            <button class="btn-order" onclick="openOrder('تاكوس دجاج')">اطلب الآن</button>
        </div>
        <div class="item-card">
            <h3>فاجيتا دجاج</h3>
            <span class="price">250 DA</span>
            <button class="btn-order" onclick="openOrder('فاجيتا دجاج')">اطلب الآن</button>
        </div>
        <div class="item-card">
            <h3>برجر كريسبي</h3>
            <span class="price">490 DA</span>
            <button class="btn-order" onclick="openOrder('برجر كريسبي')">اطلب الآن</button>
        </div>
    </div>

    <div class="modal" id="orderModal">
        <div class="modal-content">
            <h2 id="orderTitle" style="color:var(--primary)">تأكيد الطلب</h2>
            <br>
            <input type="text" id="custName" placeholder="الاسم الكامل" required>
            <input type="tel" id="custPhone" placeholder="رقم الهاتف" required>
            <select id="custCommune">
                <option value="">اختر البلدية (الجزائر العاصمة)</option>
            </select>
            <button class="btn-order" onclick="submitOrder()">إرسال الطلب</button>
            <button style="background:none; color:gray; border:none; margin-top:10px; cursor:pointer;" onclick="closeOrder()">إلغاء</button>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        // دمج مفاتيحك الخاصة التي أرسلتها في الصورة
        const firebaseConfig = {
            apiKey: "AIzaSyD5h3Luj1fmPBkZHJ9VukwA", 
            authDomain: "saladbox-f541b.firebaseapp.com",
            projectId: "saladbox-f541b",
            storageBucket: "saladbox-f541b.appspot.com",
            messagingSenderId: "326812021021",
            appId: "1:326812021021:web:2253e938ca1794776106e2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let selectedBurger = "";

        // قائمة البلديات
        const communes = ["الجزائر الوسطى", "سيدي امحمد", "بلوزداد", "باب الوادي", "بوزريعة", "دالي إبراهيم", "الشراقة", "الرويبة", "الحراش", "بئر مراد رايس", "حيدرة", "الأبيار"];
        const select = document.getElementById('custCommune');
        communes.forEach(c => {
            let opt = document.createElement('option');
            opt.value = c; opt.innerText = c;
            select.appendChild(opt);
        });

        function openOrder(name) {
            selectedBurger = name;
            document.getElementById('orderTitle').innerText = "طلب " + name;
            document.getElementById('orderModal').style.display = 'flex';
        }

        function closeOrder() { document.getElementById('orderModal').style.display = 'none'; }

        function submitOrder() {
            const name = document.getElementById('custName').value;
            const phone = document.getElementById('custPhone').value;
            const commune = document.getElementById('custCommune').value;

            if(!name || !phone || !commune) { alert("يرجى ملء جميع الخانات"); return; }

            db.collection("orders").add({
                customer: name,
                phone: phone,
                commune: commune,
                item: selectedBurger,
                status: "جديد",
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => {
                alert("تم استلام طلبك يا بطل! 🍔");
                closeOrder();
            }).catch(err => alert("خطأ: " + err));
        }
    </script>
</body>
</html>
